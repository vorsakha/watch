display_name: Watch
short_description: Scene-by-scene script watching with selective reactions and watch history memory.
default_prompt: Use $watch to fetch a movie or TV episode script from IMSDb first, fallback to transcribed anime transcripts and a generic transcript URL when needed, then use subtitle fallback from subtitlecat.com if script sources fail; enrich context with TMDB metadata, process one scene at a time, and surface reactions only for major moments. Append surfaced reactions to WATCH_LOG.md for continuity.
